services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fastenergpt
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d fastenergpt"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      # Anonymous volumes mask host .venv / caches so the container uses its
      # own Linux-built venv (host venv is macOS-native and crashes on Linux).
      - /app/.venv
      - /app/__pycache__
      - backend_cache:/root/.cache
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:dev@postgres:5432/fastenergpt
      REDIS_URL: redis://redis:6379
      CHROMA_URL: http://chromadb:8000
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-false}
    command: >
      sh -c "
        if [ \"$$SEED_ON_STARTUP\" = \"true\" ]; then
          echo '[startup] Seeding RAG...' &&
          uv run python -m scripts.seed_rag --n 250 --chroma-url http://chromadb:8000;
        fi &&
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
      "
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  minio_data:
  backend_cache:
