services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      # Keep the container's Linux virtualenv separate from the host venv.
      - /app/.venv
      - /app/__pycache__
      - backend_cache:/root/.cache
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.local
    environment:
      ENVIRONMENT: development
    command: >
      sh -c "uv run uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"
    restart: unless-stopped

volumes:
  backend_cache:
